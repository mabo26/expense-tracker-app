<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>支出記帳表</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700;900&family=Noto+Sans+TC:wght@400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B2A4A;
    --ink-2:#233457;
    --paper:#F5F1E8;
    --paper-2:#EDE7D8;
    --jade:#2F6F5E;
    --amber:#B8863B;
    --stamp:#B23A2E;
    --charcoal:#2A2622;
    --line: rgba(27,42,74,0.15);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper-2);
    font-family:'Noto Sans TC', sans-serif;
    color:var(--charcoal);
    display:flex;
    justify-content:center;
    padding:0 0 60px;
  }
  .book{
    width:100%;
    max-width:480px;
    background:var(--paper);
    min-height:100vh;
    position:relative;
    box-shadow: 0 0 40px rgba(0,0,0,0.15);
  }
  .spine{
    position:absolute;
    left:0; top:0; bottom:0;
    width:14px;
    background: repeating-linear-gradient(180deg, var(--ink) 0 10px, var(--ink-2) 10px 20px);
  }
  .cover{
    background:var(--ink);
    color:var(--paper);
    padding:28px 24px 24px 34px;
    border-bottom: 3px double var(--paper-2);
  }
  .cover .eyebrow{
    font-size:11px;
    letter-spacing:3px;
    opacity:0.6;
    margin-bottom:6px;
  }
  .cover h1{
    font-family:'Noto Serif TC', serif;
    font-weight:900;
    font-size:26px;
    margin:0;
  }
  .cover .sub{
    margin-top:8px;
    font-size:12px;
    opacity:0.7;
  }
  .yearbar{
    display:flex;
    gap:8px;
    padding:14px 16px 14px 30px;
    overflow-x:auto;
    background:var(--paper-2);
    border-bottom:1px solid var(--line);
  }
  .yearbar button{
    flex:none;
    border:1px solid var(--ink);
    background:transparent;
    color:var(--ink);
    font-family:'Roboto Mono', monospace;
    font-weight:700;
    font-size:13px;
    padding:6px 12px;
    border-radius:2px;
    cursor:pointer;
  }
  .yearbar button.active{
    background:var(--ink);
    color:var(--paper);
  }
  .monthgrid{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:6px;
    padding:12px 16px 4px 30px;
  }
  .monthgrid button{
    border:1px solid var(--line);
    background:var(--paper);
    color:var(--charcoal);
    font-family:'Roboto Mono', monospace;
    font-size:12px;
    padding:8px 0;
    border-radius:2px;
    cursor:pointer;
  }
  .monthgrid button.active{
    background:var(--jade);
    color:var(--paper);
    border-color:var(--jade);
  }
  .yearsummary{
    margin:16px 16px 8px 30px;
    padding:14px 16px;
    background:var(--stamp);
    color:var(--paper);
    border-radius:4px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-family:'Roboto Mono', monospace;
  }
  .yearsummary .item.cash .val{color:#ffd9d3;}
  .yearsummary .item.card .val{color:#ffe9c2;}
  .summary{
    margin:0 16px 8px 30px;
    padding:14px 16px;
    background:var(--ink);
    color:var(--paper);
    border-radius:4px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-family:'Roboto Mono', monospace;
  }
  .summary .item, .yearsummary .item{text-align:center;flex:1;}
  .summary .item .lbl, .yearsummary .item .lbl{font-size:10px;opacity:0.75;letter-spacing:1px;font-family:'Noto Sans TC',sans-serif;}
  .summary .item .val, .yearsummary .item .val{font-size:17px;font-weight:700;margin-top:2px;}
  .summary .item.cash .val{color:#8fd6c1;}
  .summary .item.card .val{color:#f0cf8e;}
  .summary .item.total .val{color:#fff;font-size:19px;}
  .yearsummary .item.total .val{color:#fff;font-size:19px;}

  .syncrow{
    margin:0 16px 12px 30px; font-size:11px; color:var(--ink-2); text-align:right;
  }

  .quickadd{
    margin:16px 16px 0 30px;
    border:1px solid var(--line);
    border-radius:6px;
    background:#fff;
    padding:12px;
  }
  .quickadd .tabs{display:flex;gap:6px;margin-bottom:10px;font-size:12px;color:var(--ink-2);}
  .quickadd textarea{
    width:100%;min-height:56px;border:1px solid var(--line);border-radius:4px;
    padding:8px;font-family:'Noto Sans TC',sans-serif;font-size:13px;resize:vertical;
  }
  .quickadd .actionrow{display:flex;gap:8px;margin-top:10px;}
  .quickadd button.go{
    flex:1;background:var(--jade);color:#fff;border:none;border-radius:4px;
    padding:10px;font-weight:700;font-size:13px;cursor:pointer;
  }
  .quickadd .status{font-size:12px;margin-top:8px;color:var(--ink-2);min-height:16px;}

  .manual{
    margin:14px 16px 0 30px;
    text-align:right;
  }
  .manual button{
    background:none;border:1px solid var(--ink); color:var(--ink);
    padding:6px 12px;border-radius:4px;font-size:12px;cursor:pointer;font-weight:700;
  }
  .manualform{
    margin:10px 16px 0 30px;border:1px solid var(--line);border-radius:6px;
    background:#fff; padding:12px; display:none; gap:8px; grid-template-columns:1fr 1fr;
  }
  .manualform.show{display:grid;}
  .manualform label{font-size:11px;color:var(--ink-2);display:block;margin-bottom:3px;}
  .manualform input, .manualform select{
    width:100%;padding:7px;border:1px solid var(--line);border-radius:4px;font-size:13px;
    font-family:'Noto Sans TC',sans-serif;
  }
  .manualform .full{grid-column:1/-1;}
  .manualform button{
    grid-column:1/-1;background:var(--ink);color:var(--paper);border:none;
    padding:9px;border-radius:4px;font-weight:700;cursor:pointer;
  }

  .entries{margin:18px 16px 0 30px;}
  .entries .daylabel{
    font-family:'Roboto Mono', monospace;
    font-size:11px;color:var(--ink-2);
    margin:14px 0 6px;
    border-bottom:1px dashed var(--line);
    padding-bottom:4px;
  }
  .entry{
    display:flex;align-items:center;gap:10px;
    padding:9px 0;border-bottom:1px solid var(--line);
  }
  .stamp{
    width:30px;height:30px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:900;color:#fff;flex:none;
    font-family:'Noto Serif TC',serif;
    box-shadow:0 0 0 1.5px rgba(0,0,0,0.08);
  }
  .stamp.cash{background:var(--jade);}
  .stamp.card{background:var(--amber);}
  .entry .info{flex:1;min-width:0;}
  .entry .cat{font-size:13px;font-weight:700;}
  .entry .note{font-size:11px;color:#8a8378;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .entry .amt{
    font-family:'Roboto Mono',monospace;font-weight:700;font-size:15px;
    color:var(--stamp);flex:none;
  }
  .entry .del{
    background:none;border:none;color:#bbb;font-size:16px;cursor:pointer;flex:none;padding:0 2px;
  }
  .empty{
    margin:30px 16px 0 30px;text-align:center;color:#a29b8c;font-size:13px;
    padding:30px 0; border:1px dashed var(--line); border-radius:6px;
  }
  .footerbar{
    margin:24px 16px 0 30px; display:flex; gap:8px;
  }
  .footerbar button{
    flex:1;background:var(--paper-2);border:1px solid var(--line);color:var(--ink);
    padding:9px;border-radius:4px;font-size:12px;font-weight:700;cursor:pointer;
  }
  #fileImport{display:none;}
</style>
</head>
<body>
<div class="book">
  <div class="spine"></div>
  <div class="cover">
    <div class="eyebrow">PASSBOOK · 存摺式</div>
    <h1>支出記帳表</h1>
    <div class="sub" id="coverSub">— 年度總覽 —</div>
  </div>

  <div class="yearbar" id="yearBar"></div>
  <div class="monthgrid" id="monthGrid"></div>

  <div class="yearsummary" id="yearSummary">
    <div class="item cash"><div class="lbl">年度現金</div><div class="val" id="ySumCash">$0</div></div>
    <div class="item card"><div class="lbl">年度信用卡</div><div class="val" id="ySumCard">$0</div></div>
    <div class="item total"><div class="lbl">年度合計</div><div class="val" id="ySumTotal">$0</div></div>
  </div>

  <div class="summary" id="summary">
    <div class="item cash"><div class="lbl">本月現金</div><div class="val" id="sumCash">$0</div></div>
    <div class="item card"><div class="lbl">本月信用卡</div><div class="val" id="sumCard">$0</div></div>
    <div class="item total"><div class="lbl">本月合計</div><div class="val" id="sumTotal">$0</div></div>
  </div>

  <div class="syncrow" id="syncBadge">☁️ 同步中...</div>

  <div class="quickadd">
    <div class="tabs">✏️ 文字快速新增(例:午餐120現金,咖啡80刷卡)</div>
    <textarea id="textInput" placeholder="今天中午買便當120現金,下午咖啡80刷卡"></textarea>
    <div class="actionrow">
      <button class="go" id="goBtn">解析並加入</button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <div class="manual"><button id="manualToggle">+ 手動新增一筆</button></div>
  <div class="manualform" id="manualForm">
    <div><label>日期</label><input type="date" id="mDate"></div>
    <div><label>金額</label><input type="number" id="mAmt" placeholder="0"></div>
    <div><label>分類</label><input type="text" id="mCat" placeholder="餐飲/交通..."></div>
    <div><label>付款方式</label>
      <select id="mPay"><option value="cash">現金</option><option value="card">信用卡</option></select>
    </div>
    <div class="full"><label>備註</label><input type="text" id="mNote" placeholder="選填"></div>
    <button id="mSave">儲存這筆</button>
  </div>

  <div class="entries" id="entries"></div>
  <div class="empty" id="emptyMsg" style="display:none;">這個月還沒有紀錄</div>

  <div class="footerbar">
    <button id="exportBtn">⬇ 匯出備份</button>
    <button id="importBtn">⬆ 匯入備份</button>
  </div>
  <input type="file" id="fileImport" accept="application/json">
</div>

<script>
const WORKER_URL = 'https://curly-shape-ecea.ly010696.workers.dev';

let allEntries = [];
let curYear = new Date().getFullYear();
let curMonth = new Date().getMonth()+1;
const STORAGE_KEY = 'expense_tracker_entries';

const syncBadge = document.getElementById('syncBadge');
function setSyncBadge(state){
  if(state==='ok') syncBadge.textContent = '☁️ 已同步到 GitHub';
  else if(state==='syncing') syncBadge.textContent = '☁️ 同步中...';
  else syncBadge.textContent = '⚠️ 未同步,僅存於本機';
}

async function loadData(){
  setSyncBadge('syncing');
  try{
    const resp = await fetch(WORKER_URL, { method:'GET' });
    if(!resp.ok) throw new Error('worker get failed');
    const json = await resp.json();
    allEntries = json.data || [];
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(allEntries)); }catch(e){}
    setSyncBadge('ok');
  }catch(e){
    console.error('load failed', e);
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      allEntries = raw ? JSON.parse(raw) : [];
    }catch(e2){ allEntries = []; }
    setSyncBadge('fail');
  }
  render();
}

async function saveData(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(allEntries)); }catch(e){}
  setSyncBadge('syncing');
  try{
    const resp = await fetch(WORKER_URL, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ entries: allEntries })
    });
    if(!resp.ok) throw new Error('worker put failed');
    setSyncBadge('ok');
  }catch(e){
    console.error('github save failed', e);
    setSyncBadge('fail');
  }
}

function todayStr(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function guessCategory(text){
  const map = {
    '餐飲':['吃','飯','午餐','晚餐','早餐','咖啡','飲料','餐','食','麵','便當'],
    '交通':['計程車','捷運','公車','油','停車','高鐵','火車','uber','taxi'],
    '購物':['買','購','衣服','鞋','包','電商','蝦皮','網購'],
    '娛樂':['電影','唱歌','遊戲','旅遊','門票'],
    '居家':['房租','水電','瓦斯','家具','日用品'],
    '醫療':['藥','醫院','診所','看醫生']
  };
  for(const [cat, keys] of Object.entries(map)){
    for(const k of keys){ if(text.includes(k)) return cat; }
  }
  return '其他';
}

function parseExpenseTextLocal(raw){
  const amtRegex = /\$?\s?(\d{2,6})/g;
  const matches = [...raw.matchAll(amtRegex)];
  if(!matches.length) return [];
  const results = [];
  let lastPay = 'cash';
  matches.forEach((m,i)=>{
    const start = i===0 ? 0 : matches[i-1].index + matches[i-1][0].length;
    const end = i===matches.length-1 ? raw.length : matches[i+1].index;
    const seg = raw.slice(start,end).trim();
    const amount = parseInt(m[1],10);
    let pay = lastPay;
    if(/刷卡|信用卡|刷/.test(seg)) pay='card';
    else if(/現金|付現/.test(seg)) pay='cash';
    lastPay = pay;
    results.push({ date: todayStr(), amount, category: guessCategory(seg), pay, note: seg.slice(0,20) });
  });
  return results;
}

function renderYearBar(){
  const years = new Set(allEntries.map(e=>e.date.slice(0,4)));
  years.add(String(curYear));
  const sorted = [...years].sort();
  const bar = document.getElementById('yearBar');
  bar.innerHTML = sorted.map(y=>`<button class="${parseInt(y)===curYear?'active':''}" data-y="${y}">${y}</button>`).join('');
  bar.querySelectorAll('button').forEach(b=>{
    b.onclick = ()=>{ curYear = parseInt(b.dataset.y); render(); };
  });
}

function renderMonthGrid(){
  const grid = document.getElementById('monthGrid');
  grid.innerHTML = Array.from({length:12},(_,i)=>i+1).map(m=>
    `<button class="${m===curMonth?'active':''}" data-m="${m}">${m}月</button>`
  ).join('');
  grid.querySelectorAll('button').forEach(b=>{
    b.onclick = ()=>{ curMonth = parseInt(b.dataset.m); render(); };
  });
}

function monthEntries(){
  return allEntries.filter(e=>{
    const d = new Date(e.date);
    return d.getFullYear()===curYear && (d.getMonth()+1)===curMonth;
  }).sort((a,b)=> b.date.localeCompare(a.date));
}

function render(){
  document.getElementById('coverSub').textContent = `— ${curYear} 年 ${curMonth} 月 —`;
  renderYearBar(); renderMonthGrid();

  const yList = allEntries.filter(e=>e.date.startsWith(String(curYear)));
  let yCash=0, yCard=0;
  yList.forEach(e=>{ if(e.pay==='cash') yCash+=Number(e.amount); else yCard+=Number(e.amount); });
  document.getElementById('ySumCash').textContent = '$'+yCash.toLocaleString();
  document.getElementById('ySumCard').textContent = '$'+yCard.toLocaleString();
  document.getElementById('ySumTotal').textContent = '$'+(yCash+yCard).toLocaleString();

  const list = monthEntries();
  let cash=0, card=0;
  list.forEach(e=>{ if(e.pay==='cash') cash+=Number(e.amount); else card+=Number(e.amount); });
  document.getElementById('sumCash').textContent = '$'+cash.toLocaleString();
  document.getElementById('sumCard').textContent = '$'+card.toLocaleString();
  document.getElementById('sumTotal').textContent = '$'+(cash+card).toLocaleString();

  const entriesEl = document.getElementById('entries');
  const emptyMsg = document.getElementById('emptyMsg');
  if(!list.length){
    entriesEl.innerHTML=''; emptyMsg.style.display='block';
    return;
  }
  emptyMsg.style.display='none';

  let html=''; let lastDay='';
  list.forEach(e=>{
    if(e.date!==lastDay){
      html += `<div class="daylabel">${e.date}</div>`;
      lastDay = e.date;
    }
    html += `
      <div class="entry" data-id="${e.id}">
        <div class="stamp ${e.pay}">${e.pay==='cash'?'現':'卡'}</div>
        <div class="info">
          <div class="cat">${e.category||'其他'}</div>
          <div class="note">${e.note||''}</div>
        </div>
        <div class="amt">$${Number(e.amount||0).toLocaleString()}</div>
        <button class="del" onclick="deleteEntry('${e.id}')">✕</button>
      </div>`;
  });
  entriesEl.innerHTML = html;
}

window.deleteEntry = async function(id){
  if(!confirm('確定要刪除這筆紀錄嗎?')) return;
  allEntries = allEntries.filter(e=>e.id!==id);
  await saveData();
  render();
};

const manualForm = document.getElementById('manualForm');
document.getElementById('manualToggle').onclick = ()=>{
  manualForm.classList.toggle('show');
  if(manualForm.classList.contains('show')) document.getElementById('mDate').value = todayStr();
};

document.getElementById('mSave').onclick = async ()=>{
  const date = document.getElementById('mDate').value || todayStr();
  const amount = parseFloat(document.getElementById('mAmt').value);
  if(!amount || amount<=0){ alert('請輸入正確的金額'); return; }
  const category = document.getElementById('mCat').value || '其他';
  const pay = document.getElementById('mPay').value;
  const note = document.getElementById('mNote').value;
  allEntries.push({ id: crypto.randomUUID(), date, amount, category, pay, note });
  await saveData();
  curYear = parseInt(date.slice(0,4));
  curMonth = parseInt(date.slice(5,7));
  manualForm.classList.remove('show');
  document.getElementById('mAmt').value='';
  document.getElementById('mCat').value='';
  document.getElementById('mNote').value='';
  render();
};

const statusEl = document.getElementById('status');
document.getElementById('goBtn').onclick = async ()=>{
  const txt = document.getElementById('textInput').value.trim();
  if(!txt){ statusEl.textContent='請先輸入內容'; return; }
  const parsed = parseExpenseTextLocal(txt);
  if(!parsed.length){
    statusEl.textContent = '沒有偵測到金額,請確認句子裡有數字,或改用手動新增';
    return;
  }
  parsed.forEach(p=>{
    allEntries.push({ id: crypto.randomUUID(), date:p.date, amount:p.amount, category:p.category, pay:p.pay, note:p.note });
  });
  await saveData();
  curYear = parseInt(parsed[0].date.slice(0,4));
  curMonth = parseInt(parsed[0].date.slice(5,7));
  document.getElementById('textInput').value='';
  statusEl.textContent = `已新增 ${parsed.length} 筆,請檢查金額跟分類對不對`;
  render();
};

document.getElementById('exportBtn').onclick = ()=>{
  const blob = new Blob([JSON.stringify(allEntries,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='支出記帳表備份.json';
  a.click();
  URL.revokeObjectURL(url);
};
document.getElementById('importBtn').onclick = ()=> document.getElementById('fileImport').click();
document.getElementById('fileImport').onchange = async (ev)=>{
  const file = ev.target.files[0];
  if(!file) return;
  const text = await file.text();
  try{
    const imported = JSON.parse(text);
    const ids = new Set(allEntries.map(e=>e.id));
    imported.forEach(e=>{ if(!ids.has(e.id)) allEntries.push(e); });
    await saveData();
    render();
    alert('匯入完成');
  }catch(e){ alert('檔案格式錯誤'); }
};

loadData();
</script>
</body>
</html>
